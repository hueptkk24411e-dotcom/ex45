<html>
    <head>
        <title> Tieu de trang </title>
        <style>
          
            p{
                color: white;
            }
            h1{
                color: white;
                text-align: center;
            }
              .btns{
        text-align:center;
        margin-top:20px;
    }

        </style>
    </head>
    <body>
        <div style="background:#06562b;"">
         <center>
    <img src="images/Logo.gif" width="300" height="70">
    </center>
    <h1 text-align="center"><b> Newborn Registration</b></h1>
    <form>
       <p>Date: <input type="text" placeholder="mm/dd/yy"></p>
       <p>1&#41;Infant's name: <input type="text" name="infant_name" color="white" /> Last: <input type="text" name="lastname" color="white" /></p>
       <p>2&#41;Medical Record #: <input type="text" name="medical_record" color="white"/></p>
       <p>3&#41;Date of Birth: <input type="text" placeholder="mm/dd/yy"></p>
       <p>4&#41;Birth weight: <input type="text" name="birth_weight" color="white"/></p>
         <p>5&#41;APGAR score: <input type="text" name="apgar_score" color="white"/></p>
         <p>6&#41;Mother's first name: <input type="text" name="mother_name" color="white"/> Last: <input type="text" name="lastname" color="white"/></p>
            <p>7&#41;Father's first name: <input type="text" name="father_name" color="white"/> Last: <input type="text" name="lastname" color="white"/></p>
            <p>8&#41;Physician( check all that apply:)               
                <select name="physician" multiple size="5">
                    <option value="Dr.Warren Allbert">Dr.Warren Allbert</option>
                    <option value="Dr.Maria Alvarez">Dr.Maria Alvarez</option>
                    <option value="Dr.Karen Brinkman">Dr.Karen Brinkman</option>
                    <option value="Dr.Micheal Kerry">Dr.Micheal Kerry</option>
                </select></p>
       <div class="btns">
            <button type="submit">Register</button>
            <button type="reset">Cancel</button>
        </div>
    </form>

    </div>
    </body>
</html>
