<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercise 47 - Table with Style Trigger</title>

    <style type="text/css">
        table {
            width: 600px;
            border-collapse: collapse;
            margin: 20px auto;
            font-family: "Times New Roman", serif;
            font-size: 16px;
        }

        table, th, td {
            border: 1px solid #666;
        }

        th, td {
            padding: 6px 10px;
        }

        thead, tfoot {
            background-color: blue;
            color: white;
        }

        tbody tr:nth-child(2n+1) {
            background-color: whitesmoke;
        }

        tbody tr:nth-child(2n) {
            background-color: pink;
        }

        tbody tr:hover {
            background-color: yellow;
            cursor: pointer;
        }

        .col-no {
            width: 50px;
            text-align: center;
        }

        .col-id {
            width: 150px;
            text-align: center;
        }

        .footer-cell {
            text-align: left;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <table>
        <thead>
            <tr>
                <th class="col-no">#</th>
                <th class="col-id">Student ID</th>
                <th>Student Name</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td>1</td>
                <td>123456</td>
                <td>Albert Einstein</td>
            </tr>
            <tr>
                <td>2</td>
                <td>321232</td>
                <td>Niels Bohr</td>
            </tr>
            <tr>
                <td>3</td>
                <td>987544</td>
                <td>Stephen Hawking</td>
            </tr>
            <tr>
                <td>4</td>
                <td>359687</td>
                <td>Isaac Newton</td>
            </tr>
            <tr>
                <td>5</td>
                <td>574878</td>
                <td>Nikola Tesla</td>
            </tr>
        </tbody>

        <tfoot>
            <tr>
                <td colspan="3" class="footer-cell">
                    Designed by John
                </td>
            </tr>
        </tfoot>
    </table>

</body>
</html>
